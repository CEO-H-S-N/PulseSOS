name: PulseSOS Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── Node.js Backend Verification ──────────────────────────────────────────
  backend-check:
    name: Backend CI (Node.js)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-size: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Compile TypeScript Verification
        run: |
          cd backend
          npm run build

  # ─── Flutter Mobile Verification ───────────────────────────────────────────
  mobile-check:
    name: Mobile CI (Flutter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JRE Development Kit
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Retrieve Flutter Pub Dependencies
        run: |
          cd pulse_sos
          flutter pub get

      - name: Static Analysis check
        run: |
          cd pulse_sos
          flutter analyze
